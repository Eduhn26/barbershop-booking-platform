version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: magrao_postgres
    environment:
      POSTGRES_USER: magrao
      POSTGRES_PASSWORD: magrao
      POSTGRES_DB: magrao
    ports:
      - "5432:5432"
    volumes:
      - magrao_pg:/var/lib/postgresql/data
volumes:
  magrao_pg:
